<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>0ワドワドプロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#4285F4;
    --red:#EA4335;
    --yellow:#FBBC05;
    --green:#34A853;
    --text:#202124;
    --gray:#5f6368;
    --link:#1a0dab;
    --visited:#4b2e83;
    --url-green:#006621;
    --border:#dfe1e5;
    --hover:#f8f9fa;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans JP', Arial, sans-serif;
    color:var(--text);
    background:#fff;
    min-height:100vh;
  }
  a{ color:inherit; }

  /* ---------- ロゴ ---------- */
  .logo{
    font-weight:700;
    font-size:2.6rem;
    letter-spacing:.01em;
    user-select:none;
    white-space:nowrap;
  }
  .logo.small{ font-size:1.5rem; }
  /* カービィ / ワドルディ / マホロア / メタナイト / 弱ったマホロア / 商人マホロア のカラーテーマ */
  :root{
    --c-kirby:#FF9BC2;      /* カービィ: ピンク */
    --c-waddledee:#E8935A;  /* ワドルディ: オレンジ系 */
    --c-magolor:#9B6FC9;    /* マホロア: パープル(ローブ) */
    --c-metaknight:#4A6FA8; /* メタナイト: 鋼のような青 */
    --c-magolor-weak:#9AA7B0; /* 弱った方のマホロア: 青ざめたグレイッシュカラー */
    --c-magolor-merchant:#C9A227; /* 商人マホロア: 商人らしい金茶色 */
  }
  .logo span:nth-child(6n+1){color:var(--c-kirby);}
  .logo span:nth-child(6n+2){color:var(--c-waddledee);}
  .logo span:nth-child(6n+3){color:var(--c-magolor);}
  .logo span:nth-child(6n+4){color:var(--c-metaknight);}
  .logo span:nth-child(6n+5){color:var(--c-magolor-weak);}
  .logo span:nth-child(6n){color:var(--c-magolor-merchant);}

  /* ---------- ホーム画面 ---------- */
  #homeView{
    min-height:88vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px;
    text-align:center;
  }
  #homeView .logo{ margin-bottom:26px; font-size:clamp(2rem, 7vw, 3.2rem); }
  .tagline{ color:var(--gray); font-size:.85rem; margin:-14px 0 26px; }

  .searchbox{
    width:100%; max-width:584px;
    display:flex; align-items:center; gap:10px;
    border:1px solid var(--border); border-radius:24px;
    padding:11px 18px;
    box-shadow:0 1px 6px rgba(32,33,36,.12);
    transition:box-shadow .15s ease;
  }
  .searchbox:hover, .searchbox:focus-within{ box-shadow:0 1px 10px rgba(32,33,36,.22); }
  .searchbox svg{ flex:0 0 auto; color:var(--gray); }
  .searchbox input{
    flex:1; border:none; outline:none; font-size:1rem; color:var(--text);
    font-family:'Noto Sans JP', Arial, sans-serif; background:transparent;
  }
  .searchbox .clear{
    cursor:pointer; color:var(--gray); border:none; background:none; font-size:1.1rem;
    display:none; padding:0 2px;
  }
  .searchbox .mic{
    cursor:pointer; color:var(--gray); border:none; background:none; padding:2px 2px 2px 4px;
    display:flex; align-items:center; border-left:1px solid var(--border); padding-left:10px;
    transition:color .15s ease;
  }
  .searchbox .mic:hover{ color:var(--blue); }
  .searchbox .mic.listening{ color:var(--red); animation:pulse 1s infinite; }
  .searchbox .camera{
    cursor:pointer; color:var(--gray); border:none; background:none; padding:2px 2px 2px 4px;
    display:flex; align-items:center; border-left:1px solid var(--border); padding-left:10px;
    transition:color .15s ease;
  }
  .searchbox .camera:hover{ color:var(--blue); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .mic-status{
    font-size:.72rem; color:var(--red); margin-top:8px; min-height:1em;
    text-align:center;
  }
  .topbar .mic-status{ flex-basis:100%; }

  /* ---------- コンテンツ切替タブ(Web/画像) ---------- */
  .modetabs{
    display:flex; gap:18px; padding:0 24px; margin-top:4px;
  }
  .modetabs .modetab{
    font-size:.82rem; color:var(--gray); padding:10px 2px; cursor:pointer;
    border-bottom:3px solid transparent; user-select:none; display:flex; align-items:center; gap:5px;
  }
  .modetabs .modetab.active{ color:var(--blue); border-bottom-color:var(--blue); font-weight:500; }

  /* ---------- 画像検索グリッド ---------- */
  #imageResults{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
    gap:14px; padding:14px 24px 20px; max-width:900px;
  }
  .imgcard{ cursor:pointer; text-decoration:none; color:inherit; }
  .imgcard .thumbwrap{
    width:100%; aspect-ratio:4/3; border-radius:8px; overflow:hidden; background:var(--hover);
    border:1px solid var(--border);
  }
  .imgcard img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .2s ease; }
  .imgcard:hover img{ transform:scale(1.05); }
  .imgcard .imgtitle{ font-size:.76rem; color:var(--text); margin-top:5px; line-height:1.35; }
  .imgcard .imgsite{ font-size:.68rem; color:var(--gray); }
  .img-note{
    padding:10px 24px 0; font-size:.72rem; color:var(--gray); max-width:900px;
  }

  /* ---------- 類似画像アップロード検索 ---------- */
  #reverseImageSearch{
    max-width:900px; margin:16px 24px 6px;
    background:#fbfbfd; border:1px dashed var(--border); border-radius:10px;
    padding:16px 18px;
  }
  .ris-row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .ris-dropzone{
    border:2px dashed var(--border); border-radius:8px; padding:14px 18px;
    font-size:.82rem; color:var(--gray); cursor:pointer; text-align:center;
    flex:1; min-width:220px; transition:border-color .15s ease, background .15s ease;
  }
  .ris-dropzone:hover, .ris-dropzone.dragover{ border-color:var(--blue); background:#f5f8ff; }
  .ris-preview{ display:flex; align-items:center; gap:10px; }
  .ris-preview img{ width:56px; height:56px; object-fit:cover; border-radius:6px; border:1px solid var(--border); }
  .ris-preview .ris-filename{ font-size:.76rem; color:var(--text); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #risButton{
    background:var(--blue); color:#fff; border:none; border-radius:6px;
    padding:10px 18px; font-size:.82rem; cursor:pointer; white-space:nowrap;
  }
  #risButton:disabled{ background:#c3d2f5; cursor:default; }
  #risStatus{ font-size:.76rem; color:var(--gray); margin-top:10px; }
  #risResults{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:12px; margin-top:14px;
  }
  .ris-card{ text-decoration:none; color:inherit; display:block; }
  .ris-card .thumbwrap{ position:relative; width:100%; aspect-ratio:4/3; border-radius:8px; overflow:hidden; border:1px solid var(--border); background:var(--hover); }
  .ris-card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .ris-card .ris-score{
    position:absolute; top:6px; right:6px; background:rgba(32,33,36,.75); color:#fff;
    font-size:.68rem; padding:2px 7px; border-radius:10px;
  }
  .ris-card .ris-title{ font-size:.74rem; color:var(--text); margin-top:5px; line-height:1.3; }

  /* ---------- AI要約ボックス(Google風 AI Overview) ---------- */
  #aiSummaryBox{
    max-width:600px; margin:0 24px 20px;
    background:linear-gradient(135deg,#f3f0ff,#eef6ff);
    border:1px solid #dcd6f7; border-radius:10px; padding:14px 18px;
  }
  #aiSummaryBox .ai-label{
    display:flex; align-items:center; gap:6px; font-size:.72rem; font-weight:700;
    color:#6b4fbb; margin-bottom:6px; letter-spacing:.03em;
  }
  #aiSummaryBox .ai-label .dot{
    width:8px; height:8px; border-radius:50%;
    background:conic-gradient(from 0deg, var(--c-kirby), var(--c-waddledee), var(--c-magolor), var(--c-metaknight), var(--c-magolor-weak), var(--c-magolor-merchant));
  }
  #aiSummaryBox .ai-text{ font-size:.88rem; color:var(--text); line-height:1.6; }
  #aiSummaryBox .ai-note{ font-size:.66rem; color:var(--gray); margin-top:8px; }

  .home-buttons{ margin-top:28px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .btn{
    background:#f8f9fa; border:1px solid #f8f9fa; border-radius:4px;
    padding:9px 16px; font-size:.82rem; color:#3c4043; cursor:pointer;
  }
  .btn:hover{ border-color:var(--border); box-shadow:0 1px 1px rgba(0,0,0,.1); background:#f8f9fa; }

  .home-topics{
    margin-top:34px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:600px;
  }
  .home-topics span{
    font-size:.75rem; color:var(--gray); border:1px solid var(--border); border-radius:14px;
    padding:5px 12px; cursor:pointer;
  }
  .home-topics span:hover{ background:var(--hover); }

  /* ---------- 検索履歴 ---------- */
  .history-section{
    margin-top:30px; max-width:560px; width:100%;
  }
  .history-header{
    display:flex; align-items:center; justify-content:space-between;
    font-size:.74rem; color:var(--gray); margin-bottom:8px;
  }
  .history-header .clearHistoryBtn{
    background:none; border:none; color:var(--blue); cursor:pointer; font-size:.72rem; padding:0;
  }
  .history-chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .history-chip{
    display:flex; align-items:center; gap:6px;
    font-size:.78rem; color:var(--text); background:#fff; border:1px solid var(--border);
    border-radius:16px; padding:6px 12px 6px 10px; cursor:pointer;
  }
  .history-chip:hover{ background:var(--hover); border-color:#c7cad1; }
  .history-chip .clock{ color:var(--gray); flex:0 0 auto; }
  .history-chip .count{ color:var(--gray); font-size:.68rem; }
  .history-empty{ font-size:.76rem; color:var(--gray); text-align:center; }

  /* ---------- Yahoo!風パネル ---------- */
  .yahoo-panel{
    margin-top:36px; width:100%; max-width:900px; text-align:left;
    border:1px solid #e3e3e3; border-radius:6px; overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
    font-family:'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }
  .yahoo-nav{
    display:flex; flex-wrap:wrap; gap:0; background:#fff;
    border-bottom:3px solid #FF0033;
  }
  .yahoo-nav .yahoo-cat{
    flex:1 1 auto; min-width:64px; display:flex; flex-direction:column; align-items:center;
    gap:4px; padding:10px 6px; cursor:pointer; color:#333; font-size:.68rem;
    border-right:1px solid #f0f0f0; transition:background .12s ease;
  }
  .yahoo-nav .yahoo-cat:last-child{ border-right:none; }
  .yahoo-nav .yahoo-cat:hover{ background:#fff5f5; }
  .yahoo-nav .yahoo-cat .yahoo-icon{ font-size:1.3rem; }
  .yahoo-columns{
    display:grid; grid-template-columns:2fr 1fr 1fr; gap:0; background:#fff;
  }
  .yahoo-card{ padding:14px 16px; border-right:1px solid #eee; }
  .yahoo-card:last-child{ border-right:none; }
  .yahoo-card-title{
    font-size:.78rem; font-weight:700; color:#333; margin-bottom:8px;
    padding-bottom:6px; border-bottom:2px solid #FF0033; display:inline-block;
  }
  .yahoo-topics ul{ list-style:none; margin:0; padding:0; }
  .yahoo-topics li{
    font-size:.78rem; padding:6px 0; border-bottom:1px dotted #e5e5e5;
  }
  .yahoo-topics li:last-child{ border-bottom:none; }
  .yahoo-topics li a{ color:#0055aa; text-decoration:none; }
  .yahoo-topics li a:hover{ text-decoration:underline; }
  .yahoo-topics li .yahoo-topic-tag{
    display:inline-block; font-size:.62rem; color:#fff; background:#999;
    border-radius:2px; padding:1px 5px; margin-right:6px; vertical-align:middle;
  }
  #yahooWeatherBody{ font-size:.78rem; color:#333; line-height:1.7; }
  #yahooWeatherBody .yahoo-temp{ font-size:1.4rem; font-weight:700; color:#d5001c; }
  .yahoo-ranking ol{ margin:0; padding-left:1.1rem; }
  .yahoo-ranking li{
    font-size:.76rem; padding:5px 0; color:#0055aa; cursor:pointer;
  }
  .yahoo-ranking li:hover{ text-decoration:underline; }
  @media (max-width:640px){
    .yahoo-columns{ grid-template-columns:1fr; }
    .yahoo-card{ border-right:none; border-bottom:1px solid #eee; }
  }

  footer.homefoot{
    background:#f2f2f2; color:var(--gray); font-size:.8rem;
    padding:14px 26px; display:flex; justify-content:space-between; flex-wrap:wrap;
  }
  footer.homefoot a{ margin-right:18px; }

  /* ---------- 結果画面 ---------- */
  #resultsView{ display:none; }
  .topbar{
    display:flex; align-items:center; gap:26px;
    padding:18px 24px 0; flex-wrap:wrap;
  }
  .topbar .logo{ cursor:pointer; }
  .topbar .searchbox{ max-width:560px; flex:1; min-width:260px; padding:9px 16px; }

  .tabs{
    display:flex; gap:22px; padding:14px 24px 0; border-bottom:1px solid var(--border);
    margin-top:14px; flex-wrap:wrap;
  }
  .tabs .tab{
    font-size:.85rem; color:var(--gray); padding-bottom:12px; cursor:pointer;
    border-bottom:3px solid transparent; user-select:none;
  }
  .tabs .tab.active{ color:var(--blue); border-bottom-color:var(--blue); font-weight:500; }
  .tabs .tab:hover{ color:var(--text); }

  .stats{
    padding:14px 24px 4px; color:var(--gray); font-size:.82rem; max-width:640px;
  }

  #results{ padding:6px 24px 20px; max-width:640px; }
  .result{ margin-bottom:26px; max-width:600px; }
  .result .favtitle{ display:flex; align-items:center; gap:8px; }
  .result .favicon{
    width:22px; height:22px; border-radius:50%; flex:0 0 auto;
    background:linear-gradient(135deg,var(--blue),var(--green));
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:.65rem; font-weight:700;
  }
  .result .site{ font-size:.78rem; color:var(--text); }
  .result .url{ font-size:.78rem; color:var(--url-green); word-break:break-all; }
  .result h3{ margin:2px 0 4px; font-size:1.15rem; font-weight:400; }
  .result h3 a{ color:var(--link); text-decoration:none; }
  .result h3 a:hover{ text-decoration:underline; }
  .result p.desc{ margin:0; color:var(--gray); font-size:.88rem; line-height:1.58; }
  .result p.desc b{ color:var(--text); font-weight:700; }
  .result .tags{ margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
  .result .tags span{
    font-size:.68rem; color:var(--gray); background:var(--hover);
    border-radius:10px; padding:2px 9px;
  }

  .empty{ padding:30px 0; color:var(--gray); font-size:.9rem; max-width:560px; }

  .pagination{
    display:flex; align-items:center; justify-content:center; gap:4px;
    padding:20px 24px 50px; flex-wrap:wrap;
  }
  .pagination button{
    border:none; background:none; cursor:pointer; font-size:.85rem; color:var(--blue);
    padding:8px 12px; border-radius:4px; font-family:inherit;
  }
  .pagination button.page.active{ color:#fff; background:var(--blue); border-radius:50%; width:28px; height:28px; padding:0; }
  .pagination button:disabled{ color:#c0c0c0; cursor:default; }
  .pagination button:hover:not(:disabled):not(.active){ background:var(--hover); }

  @media (max-width:640px){
    .topbar{ padding:12px 14px 0; }
    #results, .stats, .tabs{ padding-left:14px; padding-right:14px; }
  }
</style>
</head>
<body>

<!-- ============ ホーム画面 ============ -->
<div id="homeView">
  <div class="logo" id="homeLogo"></div>
  <div class="tagline">クロール件数: <span id="homeCount">0</span>ページ &middot; 実験的プロトタイプ検索</div>
  <div class="searchbox">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="qHome" type="text" placeholder="0ワドワドプロトタイプで検索" autocomplete="off">
    <button class="clear" id="clearHome">&times;</button>
    <button class="mic" id="micHome" title="音声で検索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="camera" id="cameraHome" title="画像で検索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <input type="file" id="cameraHomeInput" accept="image/*" style="display:none;">
  </div>
  <div class="mic-status" id="micStatusHome"></div>
  <div class="home-buttons">
    <button class="btn" id="btnSearchHome">0ワドワドで検索</button>
    <button class="btn" id="btnLucky">I'm Feeling ワドワド</button>
    <button class="btn" id="btnConfigureHome">⚙ 接続設定</button>
  </div>
  <div class="home-topics" id="homeTopics" style="display:none;"></div>
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-header">
      <span>🕐 最近の検索</span>
      <button class="clearHistoryBtn" id="clearHistoryBtn">履歴を削除</button>
    </div>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <div class="yahoo-panel" id="yahooPanel">
    <div class="yahoo-nav" id="yahooNav"></div>
    <div class="yahoo-columns">
      <div class="yahoo-card yahoo-topics">
        <div class="yahoo-card-title">トピックス</div>
        <ul id="yahooTopicsList"></ul>
      </div>
      <div class="yahoo-card yahoo-weather" id="yahooWeatherCard">
        <div class="yahoo-card-title">天気</div>
        <div id="yahooWeatherBody">読み込み中...</div>
      </div>
      <div class="yahoo-card yahoo-ranking">
        <div class="yahoo-card-title">検索ランキング</div>
        <ol id="yahooRankingList"></ol>
      </div>
    </div>
  </div>
</div>
<footer class="homefoot" id="homeFooter">
  <div>0ワドワドプロトタイプ</div>
  <div><a href="#" id="aboutLink">このサイトについて</a><a href="https://github.com" target="_blank" rel="noopener">crawler.pyでクロールを追加</a><a href="#" id="agentsStatusLink">🤖 自律クローラー状況</a></div>
</footer>

<!-- ============ 結果画面 ============ -->
<div id="resultsView">
  <div class="topbar">
    <div class="logo small" id="topLogo"></div>
    <div class="searchbox">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="qTop" type="text" autocomplete="off">
      <button class="clear" id="clearTop">&times;</button>
      <button class="mic" id="micTop" title="音声で検索">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="camera" id="cameraTop" title="画像で検索">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <input type="file" id="cameraTopInput" accept="image/*" style="display:none;">
    </div>
    <div class="mic-status" id="micStatusTop"></div>
    <button class="btn" id="btnConfigureTop" style="flex:0 0 auto; align-self:center;">⚙ 接続設定</button>
  </div>
  <div class="modetabs" id="modetabs">
    <div class="modetab active" data-mode="web">🔎 Web</div>
    <div class="modetab" data-mode="images">🖼 画像</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="stats" id="stats"></div>
  <div id="aiSummaryBox" style="display:none;"></div>
  <div id="results"></div>
  <div class="img-note" id="imgNote" style="display:none;">キーワードに一致するページのイメージです(デモ用サンプル画像)。実運用では画像クローラーが取得した実際のサムネイルに置き換わります。</div>
  <div id="reverseImageSearch" style="display:none;">

"url": "https://ja.wikipedia.org/wiki/%E3%83%A1%E3%83%AD%E3%83%B3%E3%83%91%E3%83%B3", "description": "メロンパンは、ビスケット生地をかぶせて焼いた日本の菓子パン。名前の由来には諸説あり、1930年代以降に名称が広まったとされる。地域によって形や中身が異なるのも特徴。", "tags": ["メロンパン", "ビスケット生地", "サンライズ", "菓子パン", "メロンパンナ"]}, {"id": 94, "topic": "ロールパン", "title": "ロールパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%AD%E3%83%BC%E3%83%AB%E3%83%91%E3%83%B3", "description": "ロールパンは、小麦粉・イースト・卵・バターなどから作る巻き型のパンで、朝食や給食で親しまれている。世界各国にバップやキプフェルなど様々な呼び名の派生形がある。", "tags": ["ロールパン", "バターロール", "テーブルロール", "バップ", "キプフェル"]}, {"id": 95, "topic": "揚げパン", "title": "揚げパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E6%8F%9A%E3%81%92%E3%83%91%E3%83%B3", "description": "揚げパンは、コッペパンなどを油で揚げ、砂糖やきな粉で味付けした日本のパン。1952年頃、東京の小学校で給食調理師が考案したのが始まりとされる。", "tags": ["揚げパン", "コッペパン", "きな粉", "大田区", "学校給食"]}, {"id": 96, "topic": "ココア揚げパン", "title": "揚げパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E6%8F%9A%E3%81%92%E3%83%91%E3%83%B3", "description": "揚げパンの解説記事では、砂糖以外にきな粉やシナモン、ココアパウダーなど様々な味付けのバリエーションがあることが紹介されている。ココア味は定番アレンジの一つ。", "tags": ["ココア揚げパン", "揚げパン", "ココアパウダー", "菓子パン"]}, {"id": 97, "topic": "ココア揚げパン", "title": "ココア揚げパンの検索結果 - クックパッド", "url": "https://cookpad.com/jp/search/%E3%82%B3%E3%82%B3%E3%82%A2%E6%8F%9A%E3%81%92%E3%83%91%E3%83%B3", "description": "レシピ投稿サイト クックパッドの「ココア揚げパン」検索結果ページ。家庭で作れるアレンジレシピが多数投稿されている。", "tags": ["ココア揚げパン", "レシピ", "クックパッド"]}, {"id": 98, "topic": "きなこ揚げパン", "title": "揚げパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E6%8F%9A%E3%81%92%E3%83%91%E3%83%B3", "description": "揚げパンの解説記事によれば、きな粉は砂糖と並んで学校給食などで定番の味付けとして紹介されている。", "tags": ["きなこ揚げパン", "揚げパン", "きな粉", "学校給食"]}, {"id": 99, "topic": "きなこ揚げパン", "title": "きなこ揚げパンの検索結果 - クックパッド", "url": "https://cookpad.com/jp/search/%E3%81%8D%E3%81%AA%E3%81%93%E6%8F%9A%E3%81%92%E3%83%91%E3%83%B3", "description": "クックパッドの「きなこ揚げパン」検索結果ページ。給食の味を再現したレシピなどが多数投稿されている。", "tags": ["きなこ揚げパン", "レシピ", "クックパッド", "給食"]}, {"id": 100, "topic": "カレーパン", "title": "カレーパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%AB%E3%83%AC%E3%83%BC%E3%83%91%E3%83%B3", "description": "カレーパンは、カレーを具にした日本の惣菜パン。発祥には諸説あるが、深川の「名花堂」が1927年に「洋食パン」として売り出したのが起源とする説が有力とされる。", "tags": ["カレーパン", "名花堂", "中村屋", "惣菜パン", "洋食パン"]}, {"id": 101, "topic": "焼きそばパン", "title": "焼きそばパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E7%84%BC%E3%81%8D%E3%81%9D%E3%81%B0%E3%83%91%E3%83%B3", "description": "焼きそばパンは、コッペパンに焼きそばを挟んだ日本独自の調理パン。東京・南千住の店で焼きそばとコッペパンを一緒に頼まれたことがきっかけで生まれたとする説が有力。", "tags": ["焼きそばパン", "コッペパン", "惣菜パン", "やきそばパンマン"]}, {"id": 102, "topic": "サンドイッチ", "title": "サンドイッチ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%B5%E3%83%B3%E3%83%89%E3%82%A4%E3%83%83%E3%83%81", "description": "サンドイッチは、パンに具材を挟んだり乗せたりした料理の総称。名称はイギリスの政治家サンドウィッチ伯爵に由来するとされるが、彼が発明したという説は俗説とされている。", "tags": ["サンドイッチ", "サンドウィッチ伯爵", "オープンサンドイッチ", "軽食"]}, {"id": 103, "topic": "サンドイッチ", "title": "サンドイッチの一覧 - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%B5%E3%83%B3%E3%83%89%E3%82%A4%E3%83%83%E3%83%81%E3%81%AE%E4%B8%80%E8%A6%A7", "description": "Wikipediaによるサンドイッチの一覧記事。世界各国の様々なサンドイッチの種類がまとめられている。", "tags": ["サンドイッチ", "一覧", "世界のサンドイッチ"]}, {"id": 104, "topic": "クロワッサン", "title": "クロワッサン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%AF%E3%83%AD%E3%83%AF%E3%83%83%E3%82%B5%E3%83%B3", "description": "クロワッサンは、バターを折り込んだ生地を焼き上げるフランス発祥のパン。名前はフランス語で三日月を意味し、独特のサクサクとした食感が特徴。", "tags": ["クロワッサン", "パン・オ・ショコラ", "ヴィエノワズリー", "三日月"]}, {"id": 105, "topic": "クロワッサン", "title": "クロワッサン | パンの図鑑", "url": "https://bread.jp.net/croissant.php", "description": "パンの図鑑によるクロワッサンの解説記事。生地とバターの層が作られる仕組みや、発祥に関する諸説を紹介している。", "tags": ["クロワッサン", "パンの図鑑", "層", "発祥"]}, {"id": 106, "topic": "ドイツパン", "title": "「フランスパン」と「ドイツパン」の違いは | 1分で読める!!", "url": "https://lowch.com/archives/22413", "description": "パンの違いを解説するメディアの記事。ドイツパンはライ麦を主成分とし、酸味のある天然酵母(サワー種)を使うことが多い、目の詰まったずっしりした食感が特徴と説明されている。", "tags": ["ドイツパン", "ライ麦パン", "黒パン", "サワー種"]}, {"id": 107, "topic": "ドイツパン", "title": "世界のパン事情 [フランス・イタリア・ドイツ・イギリス・日本 編] | パティシエントマガジン", "url": "https://www.patissient.com/magazine/2265/", "description": "パティシエ向けメディアによる世界のパン事情の記事。ドイツパンの代表格として、ライ麦と小麦を配合したパンやプレッツェル、シュトーレンなどを紹介している。", "tags": ["ドイツパン", "プレッツェル", "シュトーレン", "パティシエントマガジン"]}, {"id": 108, "topic": "イタリアパン", "title": "フォカッチャ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%95%E3%82%A9%E3%82%AB%E3%83%83%E3%83%81%E3%83%A3", "description": "フォカッチャは、オリーブオイルなどを使って焼き上げるイタリアの平たいパン。ジェノヴァ発祥とされ、ピザの原型とも言われている。", "tags": ["イタリアパン", "フォカッチャ", "ジェノヴァ", "ピザの原型"]}, {"id": 109, "topic": "イタリアパン", "title": "パニーノ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%91%E3%83%8B%E3%83%BC%E3%83%8E", "description": "パニーノは、パンに具材を挟んだイタリア料理の軽食。複数形のパニーニという表記が日本や英語圏で広く定着している。", "tags": ["イタリアパン", "パニーノ", "パニーニ", "サンドイッチ"]}, {"id": 110, "topic": "フレンチトースト", "title": "フレンチトースト - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%95%E3%83%AC%E3%83%B3%E3%83%81%E3%83%88%E3%83%BC%E3%82%B9%E3%83%88", "description": "フレンチトーストは、卵と牛乳を混ぜた液にパンを浸してから焼くパン料理。古代ローマの料理書に類似のレシピが記録されているなど、ヨーロッパで古くから作られてきた。", "tags": ["フレンチトースト", "パン・ペルデュ", "卵液", "バターシュガートースト"]}, {"id": 111, "topic": "ブレット", "title": "パンとブレッド、トーストの違いとは | 株式会社カメリヤ", "url": "https://camelia.co.jp/magazine/knowledge/69", "description": "パン専門店による豆知識記事。パンとブレッドは呼び方が違うだけで同じものであり、英語圏ではブレッド、日本語などではパンと呼ばれると解説している。", "tags": ["ブレット", "ブレッド", "パン", "呼称", "カメリヤ"]}, {"id": 112, "topic": "ブレット", "title": "ブレッドじゃないの!? 食パンの英語が複雑すぎて大混乱！ - macaroni", "url": "https://macaro-ni.jp/37646", "description": "料理情報メディアによる記事。パンとブレッド、トーストという3つの呼び方の違いや、パンにまつわる英語表現について紹介している。", "tags": ["ブレット", "ブレッド", "トースト", "英語表現", "macaroni"]}, {"id": 113, "topic": "ベーグル", "title": "ベーグル - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%99%E3%83%BC%E3%82%B0%E3%83%AB", "description": "ベーグルは、生地を輪の形にして一度茹でてから焼き上げるパン。東欧系ユダヤ人の伝統的な食べ物とされ、ニューヨーク式やモントリオール式など地域による違いも知られている。", "tags": ["ベーグル", "ニューヨークベーグル", "モントリオールベーグル", "ケトリング", "ユダヤ"]}, {"id": 114, "topic": "ナン", "title": "インドのパンの種類まとめ | 知ってお得な暮らしの情報", "url": "https://behonest-bekind.com/many-kind-of-indian-naan/", "description": "インドに滞在した筆者による解説記事。ナンは小麦粉・砂糖・イーストで作る北インドのパンで、タンドール窯で焼き上げることから家庭ではあまり作られないと紹介している。", "tags": ["ナン", "インド", "タンドール", "北インド"]}, {"id": 115, "topic": "ロティ", "title": "「ロティ」と「チャパティ」の違いについて | 名古屋本山タルカリのブログ", "url": "https://tarkari.blog/roti_chapati/", "description": "インド料理店のブログによる解説記事。ロティとチャパティは元々同じものを指す呼び名であり、全粒粉をこねて薄く焼いたパンの総称であると結論づけている。", "tags": ["ロティ", "インド", "チャパティ", "無発酵パン"]}, {"id": 116, "topic": "チャパティ", "title": "チャパティ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%81%E3%83%A3%E3%83%91%E3%83%86%E3%82%A3", "description": "チャパティは、インドやパキスタンなどで食べられる無発酵の薄焼きパン。全粒粉のアタ粉と水だけで生地を作り、タワーと呼ばれる鉄板で焼き上げる、ロティの一種とされている。", "tags": ["チャパティ", "インド", "ロティ", "アタ粉"]}, {"id": 117, "topic": "パラタ", "title": "ロティ vs ナン vs パラタ vs チャパティ: 違いと比較", "url": "https://www.askanydifference.com/ja/roti-vs-naan-vs-paratha-vs-chapati/", "description": "インド亜大陸のパンを比較する解説記事。パラタはロティより厚くナンより薄いパンで、生地を折りたたんで層状の食感を作る点が特徴と説明している。", "tags": ["パラタ", "インド", "ギー", "層状生地"]}, {"id": 118, "topic": "プーリー", "title": "「インドの主食は何？」をインド料理のプロが解説！ | インド宮廷料理 マシャール", "url": "https://mashal.jp/blog/what-is-indias-staple-food/", "description": "インド料理店による解説記事。プーリーはチャパティの生地を油で揚げたパンで、セモリナ粉を加えるとサクっとした食感になると紹介している。", "tags": ["プーリー", "インド", "揚げパン", "チャパティ"]}, {"id": 119, "topic": "ピタパン", "title": "ピタ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%94%E3%82%BF", "description": "ピタ(ピタパン)は、地中海周辺や中東、北アフリカで広く食べられる平たい円形のパン。高温で一気に焼き上げることで中が空洞になり、ポケット状に具材を詰めて食べられる。", "tags": ["ピタパン", "中東", "ポケットブレッド", "地中海"]}, {"id": 120, "topic": "ラヴァシュ", "title": "ラヴァシュ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%A9%E3%83%B4%E3%82%A1%E3%82%B7%E3%83%A5", "description": "ラヴァシュは、カフカスや西アジア、環カスピ海地域で食べられる無発酵の薄焼きパン。ラヴァシュ作りの文化は2014年と2016年にユネスコ無形文化遺産に登録されている。", "tags": ["ラヴァシュ", "アルメニア", "無発酵パン", "ユネスコ無形文化遺産"]}, {"id": 121, "topic": "マナイーシ", "title": "マナイーシ - Wikipedia", "url": "https://ja.m.wikipedia.org/wiki/%E3%83%9E%E3%83%8A%E3%82%A4%E3%83%BC%E3%82%B7", "description": "マナイーシは、パン生地にタイムやチーズ、挽肉などをトッピングして焼くレバント料理の一つ。シリアやレバノンなどで朝食・昼食として親しまれている。", "tags": ["マナイーシ", "レバノン", "ザアタル", "レバント料理"]}, {"id": 122, "topic": "インジェラ", "title": "インジェラ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%AA%E3%83%95%E3%83%81%E3%83%A7%E3%83%99%E3%83%83%E3%83%88%E3%81%97%E3%81%9F%E3%83%86%E3%83%95%E3%82%92%E3%83%9E%E3%83%96%E3%82%AC%E3%83%83%E3%83%89%E3%81%97%E3%81%A6%E3%83%AA%E3%83%83%E3%83%88%E3%81%AB%E3%81%99%E3%82%8B", "description": "インジェラは、テフという穀物を数日かけて発酵させ薄く焼き上げるエチオピアの主食。皿の代わりとしても使われ、煮込み料理をのせて手でちぎりながら食べる。", "tags": ["インジェラ", "エチオピア", "テフ", "発酵"]}, {"id": 123, "topic": "バラディ", "title": "世界のパン一覧｜各国の特徴・歴史・食べ方をわかりやすく解説 | 株式会社アミナコレクション", "url": "https://aminaflyers.amina-co.jp/list/detail/1913", "description": "世界のパンを紹介する記事。エジプトのピタパンは現地で「アエーシ」と呼ばれ、古代エジプトから続くパン文化を汲む主食として今も広く食べられていると紹介している。", "tags": ["バラディ", "エジプト", "アエーシ", "ピタパン"]}, {"id": 124, "topic": "マントウ", "title": "ふんわりフカフカ♪中国の蒸しパン「マントウ」の秘密とレシピ5選をご紹介 - macaroni", "url": "https://macaro-ni.jp/48476", "description": "料理情報メディアによるマントウの解説記事。中国北部の主食である蒸しパンで、諸葛亮にまつわる伝説や、日本の饅頭のルーツになったとされる逸話を紹介している。", "tags": ["マントウ", "中国", "蒸しパン", "饅頭"]}, {"id": 125, "topic": "中華まん", "title": "中華まん - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E4%B8%AD%E8%8F%AF%E3%81%BE%E3%82%93", "description": "中華まんは、発酵させた皮で具を包んで蒸した饅頭。中国の「包子」が原型とされ、日本では肉まん・あんまんなど独自の具材で発展してきた。", "tags": ["中華まん", "肉まん", "あんまん", "包子"]}, {"id": 126, "topic": "花捲", "title": "花捲 - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E8%8A%B1%E6%8D%B2", "description": "花捲(ホアジュアン)は、小麦粉の発酵生地を渦巻き状に成形して蒸す中国の点心。生地に油を塗って巻くことで、独特の渦巻き模様が生まれる。", "tags": ["花捲", "ホアジュエン", "中国", "蒸しパン"]}, {"id": 127, "topic": "バインミー", "title": "バインミー - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%90%E3%82%A4%E3%83%B3%E3%83%9F%E3%83%BC", "description": "バインミーは、フランスパンに具材を挟んだベトナムのサンドイッチ。ベトナム語でパンの総称を意味し、フランス植民地時代の影響でバゲット文化が根付いたことに由来する。", "tags": ["バインミー", "ベトナム", "サンドイッチ", "フランスパン"]}, {"id": 128, "topic": "菠蘿包", "title": "菠蘿包 - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E8%8F%A0%E8%98%BF%E5%8C%85", "description": "菠蘿包(ポーローパーウ)は、クッキー生地をかぶせて焼く香港のパン。日本のメロンパンと共通点が多いが、砂糖粒をまぶさずサクサクとした食感に焼き上げるのが特徴。", "tags": ["菠蘿包", "香港", "パイナップルパン", "メロンパン"]}, {"id": 129, "topic": "パンデサル", "title": "ロールパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%AD%E3%83%BC%E3%83%AB%E3%83%91%E3%83%B3", "description": "ロールパンの解説記事内で、フィリピンで最も一般的に食べられているプレーンなロールパン「パンデサル」が紹介されている。塩パンという名前だがほのかに甘い味わいが特徴。", "tags": ["パンデサル", "フィリピン", "ロールパン"]}, {"id": 130, "topic": "コッペパン", "title": "ロールパン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%AD%E3%83%BC%E3%83%AB%E3%83%91%E3%83%B3", "description": "ロールパンの解説記事では、コッペパンとロールパンの違いにも触れており、食パンと同じ生地で作られるものをコッペパンと分類する業界の基準が紹介されている。", "tags": ["コッペパン", "学校給食", "ロールパン", "日本"]}, {"id": 131, "topic": "プレッツェル", "title": "世界の美味しいパン図鑑｜種類と特徴を学ぼう | Shufoo!プラス", "url": "https://www.shufoo.net/plus/shopping_tips/312", "description": "世界のパンを紹介する記事。プレッツェルは結び目の形をしたドイツ発祥のパンで、太い部分はもっちり、細い部分はカリッとした食感が楽しめると解説している。", "tags": ["プレッツェル", "ドイツ", "ブレッツェル", "結び目"]}, {"id": 132, "topic": "シュトーレン", "title": "世界のパン事情 [フランス・イタリア・ドイツ・イギリス・日本 編] | パティシエントマガジン", "url": "https://www.patissient.com/magazine/2265/", "description": "パティシエ向けメディアの記事。シュトーレンはドイツでクリスマスの1か月前から作る習わしがある菓子パンで、ラム酒漬けのドライフルーツを練りこんで少しずつスライスして食べると紹介している。", "tags": ["シュトーレン", "ドイツ", "クリスマス", "ドライフルーツ"]}, {"id": 133, "topic": "プンパーニッケル", "title": "「フランスパン」と「ドイツパン」の違いは | 1分で読める!!", "url": "https://lowch.com/archives/22413", "description": "パンの違いを解説する記事。プンパーニッケルはライ麦粉の比率が高いドイツパンの一種で、目が詰まったずっしりした食感と酸味のある天然酵母の風味が特徴とされる。", "tags": ["プンパーニッケル", "ドイツ", "黒パン", "ライ麦"]}, {"id": 134, "topic": "ライ麦パン", "title": "世界の美味しいパン図鑑｜種類と特徴を学ぼう | Shufoo!プラス", "url": "https://www.shufoo.net/plus/shopping_tips/312", "description": "ライ麦パンはドイツを代表するパンで、グルテンを含まないライ麦を主成分とするため目の詰まったずっしりした食感になり、噛むほどに味わい深いと紹介されている。", "tags": ["ライ麦パン", "黒パン", "ドイツパン", "北欧"]}, {"id": 135, "topic": "フォカッチャ", "title": "フォカッチャ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%95%E3%82%A9%E3%82%AB%E3%83%83%E3%83%81%E3%83%A3", "description": "フォカッチャは、オリーブオイルを使って焼き上げるイタリア北部ジェノヴァ発祥の平たいパン。古代ローマ時代から作られ、現在のピザの原型とも言われている。", "tags": ["フォカッチャ", "イタリア", "ジェノヴァ", "オリーブオイル"]}, {"id": 136, "topic": "チャバタ", "title": "【パンの種類一覧】世界にはどんなパンがある？ | 株式会社神戸屋", "url": "https://www.kobeyarestaurant.co.jp/magazine/detail/16", "description": "パンの種類を紹介する記事。チャバタはイタリア語で「スリッパ」を意味する平たい形のパンで、水分を多く含み気泡が大きいのが特徴。サンドイッチにもよく使われる。", "tags": ["チャバタ", "イタリア", "スリッパ", "サンドイッチ"]}, {"id": 137, "topic": "グリッシーニ", "title": "【パンの種類一覧】世界にはどんなパンがある？ | 株式会社神戸屋", "url": "https://www.kobeyarestaurant.co.jp/magazine/detail/16", "description": "グリッシーニは「ブレッドスティック」とも呼ばれる細長い棒状のパン。クラッカーのようなカリッとした食感で、お菓子やおつまみ感覚で楽しめると紹介されている。", "tags": ["グリッシーニ", "イタリア", "ブレッドスティック", "ピエモンテ"]}, {"id": 138, "topic": "パネトーネ", "title": "パネットーネ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%91%E3%83%8D%E3%83%83%E3%83%88%E3%83%BC%E3%83%8D", "description": "パネットーネは、ドライフルーツを混ぜ込んだイタリア・ミラノ発祥の発酵菓子パン。パネットーネ種というサワードウで発酵させ、パンドーロとともにクリスマス菓子として親しまれている。", "tags": ["パネトーネ", "イタリア", "ミラノ", "クリスマス"]}, {"id": 139, "topic": "パン・ド・カンパーニュ", "title": "フランスのパン | パンの図鑑", "url": "https://bread.jp.net/france.php", "description": "パンの図鑑によるフランスのパン紹介ページ。パン・ド・カンパーニュはライ麦を混ぜて長時間発酵させることで酸味と香りが生まれる、日持ちの良い田舎パンと解説している。", "tags": ["パン・ド・カンパーニュ", "フランス", "田舎パン", "天然酵母"]}, {"id": 140, "topic": "ブリオッシュ", "title": "ブリオッシュ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%96%E3%83%AA%E3%82%AA%E3%83%83%E3%82%B7%E3%83%A5", "description": "ブリオッシュは、バターと卵を多く使った口当たりの軽いフランスの発酵パン。16世紀のノルマンディー地方が発祥とされ、ケーキに近い菓子パンとして親しまれている。", "tags": ["ブリオッシュ", "フランス", "ヴィエノワズリー", "ノルマンディー"]}, {"id": 141, "topic": "パン・オ・ショコラ", "title": "パン・オ・ショコラ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%91%E3%83%B3%E3%83%BB%E3%82%AA%E3%83%BB%E3%82%B7%E3%83%A7%E3%82%B3%E3%83%A9", "description": "パン・オ・ショコラは、クロワッサンと同じ生地を四角く成形し、チョコレートを詰めて焼くフランスの菓子パン。南西部の一部地域では「ショコラティーヌ」とも呼ばれる。", "tags": ["パン・オ・ショコラ", "フランス", "ショコラティーヌ", "クロワッサン生地"]}, {"id": 142, "topic": "エピ", "title": "パン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%91%E3%83%B3", "description": "パン全般を解説するWikipedia記事内で、フランスの郷土パンの一つとして「エピ」が紹介されている。麦の穂のような形に切り込みを入れて焼き上げるバゲットの一種。", "tags": ["エピ", "フランスパン", "麦の穂", "バゲット"]}, {"id": 143, "topic": "フーガス", "title": "パン - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%91%E3%83%B3", "description": "パン全般を解説するWikipedia記事内で、プロヴァンス地方のパン「フーガス」が紹介されている。葉のような形に切り込みを入れて焼く平たいフランスパンの一種。", "tags": ["フーガス", "プロヴァンス", "フランスパン", "葉の形"]}, {"id": 144, "topic": "シナモンロール", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。シナモンロールなど、各国の菓子パンや郷土パンが一覧で紹介されている。", "tags": ["シナモンロール", "北欧", "カネルブッレ", "菓子パン"]}, {"id": 145, "topic": "スコーン", "title": "世界の美味しいパン図鑑｜種類と特徴を学ぼう | Shufoo!プラス", "url": "https://www.shufoo.net/plus/shopping_tips/312", "description": "イギリスのパンを紹介する記事。スコーンはイギリス発祥の伝統的な菓子パンで、上部が持ち上がり側面が割れている形が特徴とされる。", "tags": ["スコーン", "イギリス", "アフタヌーンティー", "バノック"]}, {"id": 146, "topic": "ホットクロスバン", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。イースターに食べられるイギリスの菓子パン「ホット・クロス・バン」が一覧の中で紹介されている。", "tags": ["ホットクロスバン", "イギリス", "イースター", "十字"]}, {"id": 147, "topic": "ソーダブレッド", "title": "ソーダブレッド - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%BD%E3%83%BC%E3%83%80%E3%83%96%E3%83%AC%E3%83%83%E3%83%89", "description": "ソーダブレッドは、イースト菌の代わりに重曹を使うアイルランドのクイックブレッド。1840年頃にアイルランドで生まれ、朝昼晩と1日中食卓に登場する主食とされる。", "tags": ["ソーダブレッド", "アイルランド", "重曹", "クイックブレッド"]}, {"id": 148, "topic": "クランペット", "title": "クランペット - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%AF%E3%83%A9%E3%83%B3%E3%83%9A%E3%83%83%E3%83%88", "description": "クランペットは、小麦粉と酵母で作るイギリスの軽食パン。表面に小さな気孔があり弾力のある食感で、バターやジャムを添えて温めて食べるのが一般的。", "tags": ["クランペット", "イギリス", "気孔", "パンケーキ"]}, {"id": 149, "topic": "サワードウブレッド", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。天然酵母で発酵させるサンフランシスコサワーブレッドなど、サワードウ系のパンが紹介されている。", "tags": ["サワードウブレッド", "天然酵母", "サンフランシスコ", "発酵"]}, {"id": 150, "topic": "カイザーロール", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。オーストリア発祥のカイザーゼンメル(カイザーロール)など、様々なロールパンの名称が紹介されている。", "tags": ["カイザーロール", "オーストリア", "カイザーゼンメル", "ロールパン"]}, {"id": 151, "topic": "コーンブレッド", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。とうもろこし粉を使うアメリカの伝統的なパン「コーンブレッド」が一覧の中で紹介されている。", "tags": ["コーンブレッド", "アメリカ", "とうもろこし粉", "南部料理"]}, {"id": 152, "topic": "ハンバーガーバンズ", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。ハンバーガーに使われる丸いパン「ハンバーガーバンズ」がハ行の項目で紹介されている。", "tags": ["ハンバーガーバンズ", "アメリカ", "バンズ", "サンドイッチ"]}, {"id": 153, "topic": "ホットドッグバンズ", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.net/japanese_syllabary.php", "description": "世界のパンを五十音順にまとめたパンの図鑑のページ。ホットドッグに使われる細長いパン「ホットドッグバンズ」がハ行の項目で紹介されている。", "tags": ["ホットドッグバンズ", "アメリカ", "バンズ", "軽食"]}, {"id": 154, "topic": "デニッシュペストリー", "title": "デニッシュ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%83%87%E3%83%8B%E3%83%83%E3%82%B7%E3%83%A5", "description": "デニッシュ(デニッシュ・ペストリー)は、バターを多く含む生地を何重にも折り込んで焼くパン。デンマークやオーストリアなど国によって様々な種類がある。", "tags": ["デニッシュ", "デンマーク", "折り込み生地", "ペストリー"]}, {"id": 155, "topic": "イングリッシュマフィン", "title": "世界の美味しいパン図鑑｜種類と特徴を学ぼう | Shufoo!プラス", "url": "https://www.shufoo.net/plus/shopping_tips/312", "description": "伝統的なイギリスパンであるイングリッシュマフィンは、しっとりした噛みごたえのある食感が特徴。表面にコーングリッツが塗られ、トーストするとカリッとした食感になる。", "tags": ["イングリッシュマフィン", "イギリス", "コーングリッツ", "朝食"]}, {"id": 156, "topic": "アレパ", "title": "アレパ - Wikipedia", "url": "https://ja.wikipedia.org/wiki/%E3%82%A2%E3%83%AC%E3%83%91", "description": "アレパは、すり潰したとうもろこしから作るコロンビアやベネズエラの伝統的な薄焼きパン。チーズや肉を挟んだりサンドイッチにするなど、様々な食べ方がある。", "tags": ["アレパ", "ベネズエラ", "コロンビア", "とうもろこし"]}, {"id": 157, "topic": "ポン・デ・ケイジョ", "title": "五十音順(パンの名前) | パンの図鑑", "url": "https://bread.jp.n // ---------- トークン化 (日本語: 文字bi-gram, 英数字: 単語) ----------
const JP_RE = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/;
function tokenize(text){
  const tokens = [];
  let i = 0;
  const n = text.length;
  while(i < n){
    const ch = text[i];
    if(JP_RE.test(ch)){
      let j = i, run = "";
      while(j < n && JP_RE.test(text[j])){ run += text[j]; j++; }
      if(run.length === 1) tokens.push(run);
      for(let k=0;k<run.length-1;k++) tokens.push(run.slice(k,k+2));
      i = j;
    } else if(/[a-z0-9]/i.test(ch)){
      let j = i, run = "";
      while(j < n && /[a-z0-9]/i.test(text[j])){ run += text[j]; j++; }
      tokens.push(run.toLowerCase());
      i = j;
    } else { i++; }
  }
  return tokens;
}

// ---------- 事前計算: TF-IDF ----------
const docTokens = pages.map(p => {
  const full = [p.title, p.description, (p.tags||[]).join(" ")].join(" ");
  const toks = tokenize(full);
  const counts = {};
  toks.forEach(t => counts[t] = (counts[t]||0) + 1);
  return { id: p.id, counts, total: toks.length || 1 };
});
const df = {};
docTokens.forEach(d => { Object.keys(d.counts).forEach(t => { df[t] = (df[t]||0) + 1; }); });
const N = pages.length;
function idf(t){ return Math.log((N+1)/((df[t]||0)+1)) + 1; }
const tfidf = {};
docTokens.forEach(d => {
  const w = {};
  Object.entries(d.counts).forEach(([t,c]) => { w[t] = (c/d.total) * idf(t); });
  tfidf[d.id] = w;
});
const titleTokenSets = {};
pages.forEach(p => { titleTokenSets[p.id] = new Set(tokenize(p.title)); });

// 簡易 "PageRank" 的な人気度: タグ数とタイトル長から疑似的に算出(デモ用)
const popularity = {};
pages.forEach(p => { popularity[p.id] = 0.4 + (p.tags||[]).length * 0.05; });

function search(query){
  const qTokens = Array.from(new Set(tokenize(query)));
  if(qTokens.length === 0) return [];
  const scored = [];
  for(const p of pages){
    const weights = tfidf[p.id];
    let score = 0, matched = 0;
    for(const t of qTokens){
      if(weights[t]){
        score += weights[t];
        matched++;
        if(titleTokenSets[p.id].has(t)) score += weights[t] * 1.5;
      }
    }
    if(matched === 0) continue;
    const coverage = matched / qTokens.length;
    score = score * (0.5 + 0.5*coverage) + popularity[p.id]*0.05;
    scored.push({ page:p, score });
  }
  scored.sort((a,b) => b.score - a.score);
  return scored;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function boldMatch(text, qTokens){
  let out = escapeHtml(text);
  const words = qTokens.filter(t => t.length >= 2 && !JP_RE.test(t));
  words.forEach(w => {
    const re = new RegExp("("+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+")","ig");
    out = out.replace(re, "<b>$1</b>");
  });
  return out;
}

// ---------- 検索履歴 ----------
// サーバー(app.py)が起動していれば /history から永続履歴を取得して表示する。
// 起動していない場合は、このタブを開いている間だけ有効なセッション内履歴
// (sessionHistory)にフォールバックする(ページを再読み込みすると消える)。
let sessionHistory = [];

function recordLocalHistory(query){
  if(!query || !query.trim()) return;
  const q = query.trim();
  const existing = sessionHistory.find(h => h.word === q);
  if(existing){
    existing.count += 1;
    existing.searched_at = new Date().toISOString();
    sessionHistory = sessionHistory.filter(h => h.word !== q);
    sessionHistory.unshift(existing);
  } else {
    sessionHistory.unshift({ word: q, searched_at: new Date().toISOString(), count: 1 });
  }
  sessionHistory = sessionHistory.slice(0, 20);
}

async function renderHistory(){
  const section = document.getElementById("historySection");

  let items = sessionHistory;

  try{

    clearTimeout(timer);
    if(res.ok){
      const data = await res.json();
      if(data.history && data.history.length > 0) items = data.history;
    }
  } catch(e){
    // app.py が起動していない場合はここに来る(想定内) -> セッション内履歴を使う
  }

  if(!items || items.length === 0){
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  chipsEl.innerHTML = items.map(h => `
    <div class="history-chip" data-word="${escapeHtml(h.word)}">
      <span class="clock">🕐</span>${escapeHtml(h.word)}${h.count > 1 ? `<span class="count">×${h.count}</span>` : ""}
    </div>
  `).join("");
  document.querySelectorAll(".history-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      qHome.value = chip.dataset.word;
      goSearchFromHome();
    });
  });
}

function runSearch(query, resetPage){
  if(resetPage) currentPage = 1;
  document.getElementById("qTop").value = query;
  recordLocalHistory(query);

  const t0 = performance.now();
  let pool = pages;
  if(activeTopic !== "すべて") pool = pages.filter(p => p.topic === activeTopic);

  let results;
  if(query.trim() === ""){
    results = pool.map(p => ({page:p, score:popularity[p.id]}));
    results.sort((a,b)=> b.score - a.score);
  } else {
    const scoredAll = search(query);
    const poolIds = new Set(pool.map(p=>p.id));
    results = scoredAll.filter(r => poolIds.has(r.page.id));
  }
  const t1 = performance.now();
  lastResults = results;

  const statsEl = document.getElementById("stats");
  const seconds = ((t1-t0)/1000).toFixed(2);
  statsEl.innerHTML = query
    ? `約 ${results.length} 件の結果 &middot; 索引 ${pages.length}件中 &middot; (${seconds} 秒)`
    : `索引ページ ${results.length}件を表示中 &middot; (${seconds} 秒)`;

  renderPage();
}

function renderPage(){
  const resultsEl = document.getElementById("results");
  const paginationEl = document.getElementById("pagination");
  const imageResultsEl = document.getElementById("imageResults");
  const imgNoteEl = document.getElementById("imgNote");
  const query = document.getElementById("qTop").value;
  const qTokens = tokenize(query);

  if(contentMode === "images"){
    resultsEl.style.display = "none";
    paginationEl.style.display = "none";
    document.getElementById("aiSummaryBox").style.display = "none";
    document.getElementById("reverseImageSearch").style.display = "block";
    imageResultsEl.style.display = "grid";
    renderImages();
    return;
  } else {
    imageResultsEl.style.display = "none";
    imgNoteEl.style.display = "none";
    document.getElementById("reverseImageSearch").style.display = "none";
    resultsEl.style.display = "block";
    paginationEl.style.display = "flex";
  }

  if(query.trim() !== "") { tryAiSummary(query); tryDbSearch(query); }
  else document.getElementById("aiSummaryBox").style.display = "none";

  if(lastResults.length === 0){
    resultsEl.innerHTML = `<div class="empty">「${escapeHtml(query)}」に一致する情報は見つかりませんでした。<br>別のキーワードを試すか、app.py を起動していればその場でライブクロールを試みます。</div>`;
    paginationEl.innerHTML = "";
    tryLiveCrawl(query);
    return;
  }

  const totalPages = Math.max(1, Math.ceil(lastResults.length / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage-1)*PAGE_SIZE;
  const pageItems = lastResults.slice(start, start+PAGE_SIZE);

  resultsEl.innerHTML = pageItems.map(({page}) => `
    <div class="result">
      <div class="favtitle">
        <div class="favicon">${escapeHtml((page.topic||"?")[0])}</div>
        <div>
          <div class="site">${escapeHtml(page.topic||"")}</div>
          <div class="url">${escapeHtml(page.url)}</div>
        </div>
      </div>
      <h3><a href="${page.url}" target="_blank" rel="noopener">${boldMatch(page.title, qTokens)}</a></h3>
      <p class="desc">${boldMatch(page.description, qTokens)}</p>
      <div class="tags">${(page.tags||[]).map(t=>`<span>${escapeHtml(t)}</span>`).join("")}</div>
    </div>
  `).join("");

  // ページネーション
  let html = "";
  html += `<button ${currentPage===1?'disabled':''} data-p="${currentPage-1}">&lt; 前へ</button>`;
  for(let p=1; p<=totalPages; p++){
    if(totalPages > 9 && Math.abs(p-currentPage) > 3 && p!==1 && p!==totalPages){
      if(p === 2 || p === totalPages-1) html += `<span style="padding:0 4px;color:#70757a;">…</span>`;
      continue;
    }
    html += `<button class="page ${p===currentPage?'active':''}" data-p="${p}">${p}</button>`;
  }
  html += `<button ${currentPage===totalPages?'disabled':''} data-p="${currentPage+1}">次へ &gt;</button>`;
  paginationEl.innerHTML = html;
  paginationEl.querySelectorAll("button[data-p]").forEach(btn => {
    btn.addEventListener("click", () => {
      currentPage = parseInt(btn.dataset.p, 10);
      renderPage();
      window.scrollTo({top:0, behavior:"smooth"});
    });
  });

  if(query.trim() !== "") tryLiveCrawl(query);
}

async function tryLiveCrawl(query){
  const myToken = ++liveCrawlToken;

  if(existingLive) existingLive.remove();
  try{
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 4000); // 実クロールなので少し長めに待つ
    const res = await fetch(backendUrl(`/live-crawl?q=${encodeURIComponent(query)}`), { signal: controller.signal });
    clearTimeout(timer);
    if(myToken !== liveCrawlToken) return; // 別の検索に追い越された
    if(!res.ok) return;
    const data = await res.json();
    if(!data.results || data.results.length === 0) return;
    const box = document.createElement("div");

  }
}

      `${a.name}\n  状態: ${a.status} / 最終クエリ: 「${a.last_query||"-"}」/ 累計収集: ${a.total_collected}件 / 巡回回数: ${a.cycle_count}回`
    ).join("\n\n");
    alert(`🤖 自律クローラー ${data.agent_count}体の状況\n(各エージェントは2分クールタイムで自律的に巡回中)\n\n${lines}`);
  } catch(err){
    alert("バックエンド(app.py)に接続できませんでした。「⚙ 接続設定」でapp.pyが起動している端末のアドレスを確認してください。");
  }
});

// ---------- 類似画像アップロード検索 ----------
let risSelectedFile = null;

function risSetFile(file){
  if(!file || !file.type.startsWith("image/")) return;
  risSelectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById("risPreviewImg").src = e.target.result;
    document.getElementById("risFilename").textContent = file.name;
    document.getElementById("risPreview").style.display = "flex";
    document.getElementById("risButton").disabled = false;
    document.getElementById("risStatus").textContent = "";
    document.getElementById("risResults").innerHTML = "";
  };
  reader.readAsDataURL(file);
}

document.getElementById("risFileInput").addEventListener("change", (e) => {
  risSetFile(e.target.files[0]);
});

const risDropzone = document.getElementById("risDropzone");
["dragover"].forEach(evt => {
  risDropzone.addEventListener(evt, (e) => { e.preventDefault(); risDropzone.classList.add("dragover"); });
});
["dragleave", "drop"].forEach(evt => {
  risDropzone.addEventListener(evt, (e) => { e.preventDefault(); risDropzone.classList.remove("dragover"); });
});
risDropzone.addEventListener("drop", (e) => {
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if(file) risSetFile(file);
});

document.getElementById("risButton").addEventListener("click", () => performReverseImageSearch());

async function performReverseImageSearch(){
  if(!risSelectedFile) return;
  const statusEl = document.getElementById("risStatus");
  const resultsEl = document.getElementById("risResults");
  const btn = document.getElementById("risButton");
  btn.disabled = true;
  resultsEl.innerHTML = "";
  statusEl.textContent = "🔎 画像を解析して、データベースと照合しています...";

  try{
    const formData = new FormData();
    formData.append("image", risSelectedFile);
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 15000);
    const res = await fetch(backendUrl("/image-search"), {
      method: "POST",
      body: formData,
      signal: controller.signal,
    });
    clearTimeout(timer);

    if(!res.ok){
      const errData = await res.json().catch(() => ({}));
      statusEl.textContent = "エラー: " + (errData.error || `サーバーエラー(${res.status})`);
      return;
    }
    const data = await res.json();

    if(data.total_images === 0){
      statusEl.textContent = "画像データベースが空です。image_crawler.py を実行して画像を収集してから、app.py を再起動してください。";
      return;
    }
    if(!data.results || data.results.length === 0){
      statusEl.textContent = `データベース内の${data.total_images}枚の画像の中に、似ている画像は見つかりませんでした。`;
      return;
    }

    statusEl.textContent = `データベース内 ${data.total_images}枚 の中から、似ている画像を ${data.results.length}件 見つけました。`;
    resultsEl.innerHTML = data.results.map(r => `
      <a class="ris-card" href="${r.page_url}" target="_blank" rel="noopener">
        <div class="thumbwrap">
          <img loading="lazy" src="${r.image_url}" alt="${escapeHtml(r.page_title||'')}">
          <span class="ris-score">${r.similarity}% 一致</span>
        </div>
        <div class="ris-title">${escapeHtml(r.page_title || r.page_url)}</div>
      </a>
    `).join("");
  } catch(e){
    statusEl.textContent = "バックエンド(app.py)に接続できませんでした。「⚙ 接続設定」でapp.pyが起動している端末のアドレスを確認してください。";
  } finally {
    btn.disabled = false;
  }
}

// ---------- 音声入力(Web Speech API) ----------
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

function setupMic(micBtn, inputEl, statusEl, onFinish){
  if(!micBtn) return;

  if(!SpeechRecognitionAPI){
    micBtn.addEventListener("click", () => {
      if(statusEl) statusEl.textContent = "このブラウザは音声入力に対応していません(Chrome / Edgeでお試しください)";
    });
    return;
  }

  let recognition = null;
  let listening = false;

  function createRecognition(){
    const r = new SpeechRecognitionAPI();
    r.lang = "ja-JP";
    r.interimResults = true;
    r.maxAlternatives = 1;
    r.continuous = false;

    r.onstart = () => {
      listening = true;
      micBtn.classList.add("listening");
      if(statusEl) statusEl.textContent = "🎤 聞き取り中... なにか話してください";
    };
    r.onend = () => {
      listening = false;
      micBtn.classList.remove("listening");
      if(statusEl && statusEl.textContent.startsWith("🎤")) statusEl.textContent = "";
    };
    r.onerror = (e) => {
      listening = false;
      micBtn.classList.remove("listening");
      let msg;
      switch(e.error){
        case "not-allowed":
        case "service-not-allowed":
          msg = "マイクの使用が許可されていません。ブラウザのアドレスバー付近の設定からマイクを許可してください。";
          break;
        case "no-speech":
          msg = "音声が検出されませんでした。もう一度マイクをクリックして話してください。";
          break;
        case "network":
          msg = "音声認識サーバーに接続できませんでした。ネットワーク接続を確認してください。";
          break;
        default:
          msg = "音声入力でエラーが発生しました(" + e.error + ")。もう一度お試しください。";
      }
      if(statusEl) statusEl.textContent = msg;
    };
    r.onresult = (e) => {
      let transcript = "";
      for(let i=0; i<e.results.length; i++){ transcript += e.results[i][0].transcript; }
      inputEl.value = transcript;
      if(e.results[e.results.length-1].isFinal){
        if(statusEl) statusEl.textContent = "";
        onFinish(transcript);
      }
    };
    return r;
  }

  micBtn.addEventListener("click", () => {
    if(listening && recognition){
      recognition.stop();
      return;
    }
    if(!window.isSecureContext && location.protocol === "file:"){
      if(statusEl) statusEl.textContent = "音声入力はセキュリティ上の理由でブロックされる場合があります。うまく動かない場合は「python -m http.server」等でこのページを配信して開いてください。";
    }
    recognition = createRecognition();
    try{
      recognition.start();
    } catch(err){
      if(statusEl) statusEl.textContent = "音声入力を開始できませんでした。もう一度クリックしてください。";
    }
  });
}

setupMic(document.getElementById("micHome"), qHome, document.getElementById("micStatusHome"), (text) => {
  document.getElementById("clearHome").style.display = text ? "block" : "none";
  goSearchFromHome();
});

// ---------- 検索ボックスのカメラボタン(画像で検索) ----------
function switchToImageSearchAndRun(file){
  if(!file) return;
  showResultsView();
  contentMode = "images";
  buildModeTabs();
  renderPage();
  risSetFile(file);
  performReverseImageSearch();
}

});

  e.target.value = ""; // 同じファイルを選び直しても change が発火するようにする
});

  document.getElementById("cameraTopInput").click();
});
document.getElementById("cameraTopInput").addEventListener("change", (e) => {
  switchToImageSearchAndRun(e.target.files[0]);
  e.target.value = "";
});
